version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: alpha_monitor_postgres
    restart: always
    environment:
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha_password
      POSTGRES_DB: alpha_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: alpha_monitor_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
